<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SmartFind AI Session</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0b0f19;
      font-family: system-ui, sans-serif;
      color: #f9fafb;
    }

    header {
      padding: 20px;
      text-align: center;
      background: #111827;
      border-bottom: 1px solid #1f2937;
    }

    header h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(120deg, #4f46e5, #22d3ee, #a855f7);
      -webkit-background-clip: text;
      color: transparent;
    }

    .container {
      max-width: 800px;
      margin: 30px auto;
      padding: 20px;
      background: #111827;
      border-radius: 12px;
      border: 1px solid #1f2937;
    }

    .session-info {
      font-size: 14px;
      color: #9ca3af;
      margin-bottom: 20px;
      text-align: center;
    }

    #chat-box {
      height: 400px;
      overflow-y: auto;
      padding: 15px;
      background: #0f172a;
      border-radius: 10px;
      border: 1px solid #1e293b;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .message {
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .user {
      color: #22d3ee;
      font-weight: 600;
    }

    .ai {
      color: #c7d2fe;
    }

    #input-area {
      display: flex;
      gap: 10px;
    }

    #user-input {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #1e293b;
      color: white;
      font-size: 14px;
    }

    #send-btn {
      padding: 12px 18px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, #4f46e5, #22d3ee);
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    #send-btn:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>

<header>
  <h1>SmartFind AI Session</h1>
</header>

<div class="container">
  <div class="session-info">
    You have started a SmartFind Session.  
    You may ask up to <strong>5 questions</strong>.
  </div>

  <div id="chat-box"></div>

  <div id="input-area">
    <input id="user-input" type="text" placeholder="Ask your question..." />
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
  let questionCount = 0;
  const maxQuestions = 5;

  async function sendMessage() {
    const input = document.getElementById("user-input");
    const text = input.value.trim();
    if (!text) return;

    questionCount++;

    const chatBox = document.getElementById("chat-box");
    chatBox.innerHTML += `<div class="message"><span class="user">You:</span> ${text}</div>`;
    input.value = "";

    if (questionCount > maxQuestions) {
      chatBox.innerHTML += `<div class="message ai"><strong>SmartFind AI:</strong> You have reached your 5‑question limit for this session.</div>`;
      return;
    }

    // Show loading message
    chatBox.innerHTML += `<div class="message ai" id="loading">SmartFind AI is searching...</div>`;
    chatBox.scrollTop = chatBox.scrollHeight;

    // REAL AI CALL
    const apiKey = "YOUR_API_KEY_HERE";  // ← paste your API key here

    const systemPrompt = `
You are SmartFind AI. Your job is to return 3–7 curated options with:
- short explanations
- direct links
- no fluff
- no long paragraphs
- no more than 7 results
- clear, actionable choices
`;

    const response = await fetch("https://api.openai.com/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + apiKey
      },
      body: JSON.stringify({
        model: "gpt-4o-mini",
        messages: [
          { role: "system", content: systemPrompt },
          { role: "user", content: text }
        ]
      })
    });

    const data = await response.json();

    document.getElementById("loading").remove();

    const aiMessage = data.choices?.[0]?.message?.content || "SmartFind AI could not process your request.";

    chatBox.innerHTML += `
      <div class="message ai">
        <strong>SmartFind AI:</strong><br>${aiMessage}
      </div>
    `;

    chatBox.scrollTop = chatBox.scrollHeight;
  }
</script>

</body>
</html>
