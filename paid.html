<<script>
  let questionCount = 0;
  const maxQuestions = 5;

  function endSession() {
    const chatBox = document.getElementById("chat-box");

    chatBox.innerHTML += `
      <div class="message ai">
        <strong>SmartFind AI:</strong>  
        Your Smart Session has ended. You reached your 5‑question limit.
      </div>

      <div style="margin-top:20px; text-align:center;">
        <button onclick="buyAnotherSession()" 
          style="
            padding: 12px 20px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(135deg, #4f46e5, #22d3ee);
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 15px;
          ">
          Buy Another SmartFind Session
        </button>
      </div>
    `;
  }

  function buyAnotherSession() {
    // Redirect to your Stripe checkout link
    window.location.href = "https://buy.stripe.com/bJeeV5amZfwv19s9Xe7g400";
  }

  async function sendMessage() {
    const input = document.getElementById("user-input");
    const text = input.value.trim();
    if (!text) return;

    questionCount++;

    const chatBox = document.getElementById("chat-box");
    chatBox.innerHTML += `<div class="message"><span class="user">You:</span> ${text}</div>`;
    input.value = "";

    // SESSION EXPIRED
    if (questionCount > maxQuestions) {
      endSession();
      return;
    }

    // Show loading message
    chatBox.innerHTML += `<div class="message ai" id="loading">SmartFind AI is searching...</div>`;
    chatBox.scrollTop = chatBox.scrollHeight;

    // REAL AI CALL
    const apiKey = "YOUR_API_KEY_HERE";  // ← paste your API key here

    const systemPrompt = `
You are SmartFind AI. Your job is to return 3–7 curated options with:
- short explanations
- direct links
- no fluff
- no long paragraphs
- no more than 7 results
- clear, actionable choices
`;

    const response = await fetch("https://api.openai.com/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + apiKey
      },
      body: JSON.stringify({
        model: "gpt-4o-mini",
        messages: [
          { role: "system", content: systemPrompt },
          { role: "user", content: text }
        ]
      })
    });

    const data = await response.json();

    document.getElementById("loading").remove();

    const aiMessage = data.choices?.[0]?.message?.content || "SmartFind AI could not process your request.";

    chatBox.innerHTML += `
      <div class="message ai">
        <strong>SmartFind AI:</strong><br>${aiMessage}
      </div>
    `;

    chatBox.scrollTop = chatBox.scrollHeight;
  }
</script>
