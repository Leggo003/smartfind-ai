<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SmartFind AI Session</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at top, #020617 0, #020617 40%, #000 100%);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Segoe UI", sans-serif;
      color: #f9fafb;
    }

    header {
      padding: 20px;
      text-align: center;
      background: #020617;
      border-bottom: 1px solid #1f2937;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(120deg, #4f46e5, #22d3ee, #a855f7);
      -webkit-background-clip: text;
      color: transparent;
    }

    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .container {
      margin-top: 20px;
      padding: 20px;
      background: rgba(15, 23, 42, 0.96);
      border-radius: 16px;
      border: 1px solid #1f2937;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.6);
    }

    .session-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 10px;
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 12px;
    }

    .session-pill {
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid #1f2937;
    }

    .session-pill strong {
      color: #e5e7eb;
    }

    .banner {
      margin-bottom: 16px;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(37, 99, 235, 0.12);
      border: 1px solid rgba(59, 130, 246, 0.4);
      font-size: 13px;
      color: #c7d2fe;
    }

    .banner strong {
      color: #e5e7eb;
    }

    .toolbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 10px;
    }

    .toolbar button {
      padding: 7px 12px;
      border-radius: 999px;
      border: none;
      background: #111827;
      color: #e5e7eb;
      font-size: 12px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .toolbar button:hover {
      background: #1f2937;
    }

    #chat-box {
      height: 420px;
      overflow-y: auto;
      padding: 16px;
      background: radial-gradient(circle at top left, #020617 0, #020617 40%, #020617 100%);
      border-radius: 14px;
      border: 1px solid #1e293b;
      margin-bottom: 16px;
      font-size: 14px;
    }

    .message-row {
      display: flex;
      margin-bottom: 10px;
    }

    .message-row.user {
      justify-content: flex-end;
    }

    .message-row.ai {
      justify-content: flex-start;
    }

    .bubble {
      max-width: 80%;
      padding: 10px 12px;
      border-radius: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .bubble.user {
      background: linear-gradient(135deg, #4f46e5, #22d3ee);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .bubble.ai {
      background: #020617;
      border: 1px solid #1f2937;
      color: #e5e7eb;
      border-bottom-left-radius: 4px;
    }

    .bubble strong {
      font-weight: 600;
    }

    .meta {
      font-size: 11px;
      color: #9ca3af;
      margin-bottom: 4px;
    }

    #input-area {
      display: flex;
      gap: 10px;
      margin-top: 4px;
    }

    #user-input {
      flex: 1;
      padding: 12px;
      border-radius: 999px;
      border: 1px solid #1f2937;
      background: #020617;
      color: white;
      font-size: 14px;
    }

    #user-input:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #send-btn {
      padding: 12px 18px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #4f46e5, #22d3ee);
      color: white;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
      white-space: nowrap;
    }

    #send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #send-btn:hover:not(:disabled) {
      opacity: 0.9;
    }

    @media (max-width: 640px) {
      .container {
        padding: 16px;
      }
      #chat-box {
        height: 360px;
      }
      .bubble {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>SmartFind AI Session</h1>
  </header>

  <div class="page">
    <div class="container">
      <div class="session-bar">
        <div class="session-pill">
          Session ID: <strong id="session-id"></strong>
        </div>
        <div class="session-pill">
          Questions left: <strong id="questions-left"></strong> / 5
        </div>
        <div class="session-pill">
          Time remaining: <strong id="timer"></strong>
        </div>
      </div>

      <div class="banner">
        <strong>Smart Session active.</strong> You can ask up to 5 focused questions in this session.  
        SmartFind AI will return 3–7 curated options with short explanations and direct links.
      </div>

      <div class="toolbar">
        <button onclick="saveResults()">
          💾 Save my results
        </button>
      </div>

      <div id="chat-box"></div>

      <div id="input-area">
        <input id="user-input" type="text" placeholder="Describe what you're trying to find..." />
        <button id="send-btn" onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

  <script>
    /* ---------------------------
       SMARTFIND AI SESSION CONFIG
    ----------------------------*/
    const maxQuestions = 5;
    const sessionDuration = 10 * 60; // 10 minutes in seconds
    const stripeLink = "https://buy.stripe.com/bJeeV5amZfwv19s9Xe7g400";

    let questionCount = 0;
    let timeLeft = sessionDuration;
    let sessionID = "SF-" + Math.random().toString(36).substring(2, 10).toUpperCase();
    let resultsLog = [];

    /* ---------------------------
       INITIALIZE SESSION
    ----------------------------*/
    window.onload = () => {
      document.getElementById("session-id").innerText = sessionID;
      document.getElementById("questions-left").innerText = maxQuestions;
      startCountdown();
      addSystemIntro();
    };

    function addSystemIntro() {
      const chatBox = document.getElementById("chat-box");
      chatBox.innerHTML += `
        <div class="message-row ai">
          <div class="bubble ai">
            <div class="meta">SmartFind AI</div>
            <strong>Welcome to your Smart Session.</strong><br>
            Tell me what you're trying to find — products, services, tools, resources, or information — and I'll return 3–7 curated options with short explanations and direct links.
          </div>
        </div>
      `;
    }

    /* ---------------------------
       COUNTDOWN TIMER
    ----------------------------*/
    function startCountdown() {
      const timer = setInterval(() => {
        timeLeft--;

        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;

        document.getElementById("timer").innerText =
          `${minutes}m ${seconds < 10 ? "0" : ""}${seconds}s`;

        if (timeLeft <= 0) {
          clearInterval(timer);
          endSession("Your Smart Session has expired.");
        }
      }, 1000);
    }

    /* ---------------------------
       END SESSION
    ----------------------------*/
    function endSession(message) {
      const chatBox = document.getElementById("chat-box");

      chatBox.innerHTML += `
        <div class="message-row ai">
          <div class="bubble ai">
            <div class="meta">SmartFind AI</div>
            <strong>${message}</strong><br>
            To continue using SmartFind AI, you can purchase another Smart Session or upgrade to a premium plan.
          </div>
        </div>

        <div style="margin-top:16px; text-align:center;">
          <button onclick="buyAnotherSession()" 
            style="
              padding: 12px 20px;
              border-radius: 999px;
              border: none;
              background: linear-gradient(135deg, #4f46e5, #22d3ee);
              color: white;
              font-weight: 600;
              cursor: pointer;
              font-size: 15px;
            ">
            Buy Another SmartFind Session
          </button>

          <button onclick="upgradePremium()" 
            style="
              padding: 12px 20px;
              border-radius: 999px;
              border: none;
              background: linear-gradient(135deg, #f59e0b, #fbbf24);
              color: #111827;
              font-weight: 700;
              cursor: pointer;
              font-size: 15px;
              margin-left: 10px;
            ">
            Upgrade to Premium
          </button>
        </div>
      `;

      document.getElementById("user-input").disabled = true;
      document.getElementById("send-btn").disabled = true;
    }

    function buyAnotherSession() {
      window.location.href = stripeLink;
    }

    function upgradePremium() {
      alert("Premium tier coming soon: unlimited questions, deeper searches, and priority results.");
    }

    /* ---------------------------
       SAVE RESULTS AS TEXT FILE
    ----------------------------*/
    function saveResults() {
      if (!resultsLog.length) {
        alert("No results to save yet.");
        return;
      }
      const blob = new Blob([resultsLog.join("\n\n--------------------\n\n")], { type: "text/plain" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = `SmartFindAI-Results-${sessionID}.txt`;
      link.click();
    }

    /* ---------------------------
       SEND MESSAGE TO AI
    ----------------------------*/
    async function sendMessage() {
      const input = document.getElementById("user-input");
      const text = input.value.trim();
      if (!text) return;

      questionCount++;
      const remaining = Math.max(0, maxQuestions - questionCount);
      document.getElementById("questions-left").innerText = remaining;

      const chatBox = document.getElementById("chat-box");

      chatBox.innerHTML += `
        <div class="message-row user">
          <div class="bubble user">
            <div class="meta">You</div>
            ${text}
          </div>
        </div>
      `;
      input.value = "";

      if (questionCount > maxQuestions) {
        endSession("You reached your 5‑question limit.");
        return;
      }

      chatBox.innerHTML += `
        <div class="message-row ai" id="loading-row">
          <div class="bubble ai">
            <div class="meta">SmartFind AI</div>
            SmartFind AI is searching and curating options for you...
          </div>
        </div>
      `;
      chatBox.scrollTop = chatBox.scrollHeight;

      const apiKey = "const apiKey = import OpenAI from "openai";
const client = new OpenAI();

const response = await client.responses.create({
  model: "gpt-5.2",
  input: "Write a short bedtime story about a unicorn.",
});

console.log(response.output_text);

      const systemPrompt = `
You are SmartFind AI. Your job is to return 3–7 curated options with:
- short explanations
- direct links
- no fluff
- no long paragraphs
- clear, actionable choices
Format results as a numbered list with each item containing:
- name/title
- 1–2 sentence explanation
- direct link (if applicable).
`;

      try {
        const response = await fetch("https://api.openai.com/v1/chat/completions", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + apiKey
          },
          body: JSON.stringify({
            model: "gpt-4o",
            messages: [
              { role: "system", content: systemPrompt },
              { role: "user", content: text }
            ]
          })
        });

        const data = await response.json();
        const loadingRow = document.getElementById("loading-row");
        if (loadingRow) loadingRow.remove();

        const aiMessage = data.choices?.[0]?.message?.content || "SmartFind AI could not process your request.";

        resultsLog.push(`Session: ${sessionID}\nQ: ${text}\n\nA:\n${aiMessage}`);

        chatBox.innerHTML += `
          <div class="message-row ai">
            <div class="bubble ai">
              <div class="meta">SmartFind AI</div>
              ${aiMessage.replace(/\n/g, "<br>")}
            </div>
          </div>
        `;

        chatBox.scrollTop = chatBox.scrollHeight;
      } catch (err) {
        const loadingRow = document.getElementById("loading-row");
        if (loadingRow) loadingRow.remove();

        chatBox.innerHTML += `
          <div class="message-row ai">
            <div class="bubble ai">
              <div class="meta">SmartFind AI</div>
              There was an error contacting the AI service. Please try again in a moment.
            </div>
          </div>
        `;
        chatBox.scrollTop = chatBox.scrollHeight;
      }
    }
  </script>
</body>
</html>
